<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HF Vertical Designer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- Navbar placeholder -->
  <div id="navbar"></div>

  <header>
    <h1>HF Vertical Designer</h1>
  </header>

  <main>

    <!-- Left Column: Geometry + Matching -->
    <section class="panel">
      <h2>Antenna Geometry</h2>

      <label>Element length (ft)</label>
      <input id="el_len" type="number" value="25">

      <label>Mast height (ft)</label>
      <input id="mast_height" type="number" value="33">

      <label>Foldover / helical mode</label>
      <select id="fold_mode">
        <option value="none">None (straight)</option>
        <option value="fold">Foldover</option>
        <option value="helix">Helical</option>
      </select>

      <label>Counterpoise</label>
      <select id="counterpoise">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>

      <label>Counterpoise length (ft)</label>
      <input id="cp_len" type="number" value="3.3">
    </section>

    <section class="panel">
      <h2>Matching & Feedline</h2>

      <label>Balun / UNUN</label>
      <select id="transformer">
        <option value="1">1:1 (balun)</option>
        <option value="4">4:1</option>
        <option value="9">9:1</option>
        <option value="49">49:1</option>
        <option value="64">64:1</option>
      </select>

      <label>Feedline type</label>
      <select id="feedline_type">
        <option value="LMR400">LMR-400</option>
        <option value="RG213">RG-213</option>
        <option value="RG8X">RG-8X</option>
        <option value="RG58">RG-58</option>
      </select>

      <label>Feedline length (ft)</label>
      <input id="feedline_len" type="number" value="75">

      <label>TX / amp output (W)</label>
      <input id="tx_power" type="number" value="100">
    </section>

    <!-- Right Column: Environment -->
    <section class="panel">
      <h2>Environment & Height</h2>

      <label>Height mode</label>
      <select id="height_mode">
        <option value="top">Element top at mast tip</option>
        <option value="base">Element base at mast tip</option>
      </select>

      <label>Site type</label>
      <select id="site_type">
        <option value="inland">Inland soil</option>
        <option value="coastal">Coastal</option>
        <option value="rocky">Rocky</option>
      </select>

      <label>Radials count</label>
      <input id="radials_count" type="number" value="4">

      <label>Radials length (ft)</label>
      <input id="radials_len" type="number" value="16">

      <label>Time of day</label>
      <select id="tod">
        <option value="day">Day</option>
        <option value="night">Night</option>
      </select>

      <button onclick="calculateBands()">Calculate bands & ERP</button>
    </section>

    <!-- Results Section -->
    <section class="panel" style="flex-basis:100%;">
      <h2>Band Capability & SWR</h2>

      <table class="table-like" id="results_table">
        <thead>
          <tr>
            <th>Band</th>
            <th>Freq (MHz)</th>
            <th>Usable?</th>
            <th>SWR (no tuner)</th>
            <th>SWR (with tuner)</th>
            <th>ERP (W)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <h3>Summary</h3>
      <div id="summary_block" class="summary-block"></div>

      <h3>Radiation Patterns</h3>
      <div class="plot-row">
        <canvas id="az_plot" width="260" height="260"></canvas>
        <canvas id="el_plot" width="260" height="260"></canvas>
      </div>
    </section>

  </main>

  <!-- Shared JS utilities -->
  <script src="assets/js/utils.js"></script>

  <!-- Navbar loader -->
  <script src="assets/js/include-navbar.js"></script>

  <!-- Main calculator logic -->
  <script>
    function calculateBands() {
      const bands = [
        { name: "80m", freq: 3.5 },
        { name: "60m", freq: 5.33 },
        { name: "40m", freq: 7.1 },
        { name: "30m", freq: 10.1 },
        { name: "20m", freq: 14.1 },
        { name: "17m", freq: 18.1 },
        { name: "15m", freq: 21.2 },
        { name: "12m", freq: 24.9 },
        { name: "10m", freq: 28.5 },
        { name: "6m", freq: 50.1 }
      ];

      const tx = Number(document.getElementById("tx_power").value);
      const feedType = document.getElementById("feedline_type").value;
      const feedLen = Number(document.getElementById("feedline_len").value);

      const tbody = document.querySelector("#results_table tbody");
      tbody.innerHTML = "";

      bands.forEach(b => {
        const swr = 4.0; // placeholder
        const swrNoTuner = 16.0; // placeholder
        const loss = HFUtils.totalCoaxLossDb(b.freq, feedType, feedLen);
        const erp = HFUtils.erpWatts(tx, 0, loss, 0);

        const row = `
          <tr>
            <td>${b.name}</td>
            <td>${b.freq.toFixed(2)}</td>
            <td>${swr <= 3 ? "Yes" : "Tuner"}</td>
            <td>${swrNoTuner.toFixed(1)}</td>
            <td>${swr.toFixed(1)}</td>
            <td>${erp.toFixed(1)}</td>
          </tr>
        `;
        tbody.insertAdjacentHTML("beforeend", row);
      });

      document.getElementById("summary_block").innerHTML =
        "Calculated using shared HFUtils engine.";
    }
  </script>

</body>
</html>
